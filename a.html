<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AterBus - Rastreamento Urbano de Precisão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 100vh; width: 100%; z-index: 1; background: #e5e7eb; }
        .custom-shadow { box-shadow: 0 -4px 30px rgba(0,0,0,0.25); }
        .search-results-box { max-height: 280px; overflow-y: auto; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .bus-marker { transition: all 1s linear; }
        .user-marker { transition: all 0.5s ease-out; }
    </style>
</head>
<body class="bg-slate-900 overflow-hidden font-sans text-slate-900">

    <!-- Barra de Busca -->
    <div class="absolute top-6 left-4 right-4 z-[1000] md:max-w-md md:left-6 pointer-events-none">
        <div class="bg-white rounded-3xl shadow-2xl pointer-events-auto overflow-hidden border border-slate-100">
            <div class="flex items-center p-3">
                <div class="p-2 text-blue-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input id="busSearch" type="text" placeholder="Buscar linha ou destino..." 
                       class="w-full p-2 text-lg border-none focus:ring-0 text-slate-700 outline-none font-semibold">
                <button onclick="centerOnUser()" class="p-2 text-blue-500 hover:bg-blue-50 rounded-full transition-colors" title="Minha Localização">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </button>
            </div>
            
            <div id="searchResults" class="search-results-box border-t border-slate-50 hidden bg-white"></div>
        </div>
    </div>

    <!-- Mapa -->
    <div id="map"></div>

    <!-- Detalhes do Ônibus -->
    <div id="infoCard" class="absolute bottom-0 left-0 right-0 bg-white p-8 rounded-t-[3rem] custom-shadow z-[2000] transform translate-y-full transition-transform duration-700 ease-out md:max-w-sm md:left-6 md:mb-6 md:rounded-[2.5rem] md:translate-y-0 md:opacity-0 md:pointer-events-none">
        <div class="w-16 h-1.5 bg-slate-100 rounded-full mx-auto mb-8 md:hidden"></div>
        
        <div class="flex justify-between items-start mb-6">
            <div class="flex-1">
                <p id="cardBusRoute" class="text-xs font-black text-blue-600 uppercase tracking-widest mb-1">Rota em curso</p>
                <h2 id="cardBusName" class="text-4xl font-black text-slate-800 tracking-tighter italic">L --</h2>
            </div>
            <button onclick="closeDetails()" class="bg-slate-50 p-2 rounded-full text-slate-400 hover:text-slate-600">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div class="space-y-4">
            <div class="bg-blue-600 text-white p-6 rounded-[2rem] shadow-xl shadow-blue-100 relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-[10px] font-bold opacity-80 uppercase mb-1">Previsão de Chegada</p>
                    <div class="flex items-baseline gap-1">
                        <span id="cardETA" class="text-5xl font-black">--</span>
                        <span class="text-xl font-bold">min</span>
                    </div>
                </div>
                <svg class="absolute -right-4 -bottom-4 w-24 h-24 text-blue-500 opacity-30" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" />
                </svg>
            </div>

            <div class="flex gap-3">
                <div class="flex-1 bg-slate-50 p-4 rounded-2xl border border-slate-100 text-center">
                    <p class="text-[9px] font-black text-slate-400 uppercase">Distância</p>
                    <p id="cardDist" class="text-xl font-black text-slate-700">-- km</p>
                </div>
                <div class="flex-1 bg-slate-50 p-4 rounded-2xl border border-slate-100 text-center">
                    <p class="text-[9px] font-black text-slate-400 uppercase">Velocidade</p>
                    <p class="text-xl font-black text-green-600">~15 km/h</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Tela de Carregamento -->
    <div id="loadingScreen" class="absolute inset-0 bg-slate-900 z-[3000] flex flex-col items-center justify-center text-white transition-opacity duration-1000">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-500 mb-4"></div>
        <h2 class="text-2xl font-black tracking-tighter text-center px-4">Calibrando Velocidade Urbana...</h2>
        <p class="text-slate-400 text-sm mt-2">Sincronizando com as ruas de Criciúma</p>
    </div>

    <script>
        const LOCS = {
            CENTRAL: [-28.6780, -49.3680],
            PINHEIRINHO: [-28.6952, -49.4055],
            STA_LUZIA: [-28.7100, -49.3510],
            ESUCRI: [-28.6751, -49.3663]
        };

        const BUS_DATA = [
            { 
                id: 1, name: "101", routeName: "CENTRO / PINHEIRINHO", color: "#2563eb", 
                waypoints: [LOCS.CENTRAL, [-28.6850, -49.3750], LOCS.PINHEIRINHO],
                path: [], 
                currentStep: 0, direction: 1, 
                speed: 0.005 // VELOCIDADE REDUZIDA: ~15km/h considerando a densidade de pontos da API
            },
            { 
                id: 2, name: "102", routeName: "CENTRO / STA. LUZIA", color: "#8b5cf6",
                waypoints: [LOCS.CENTRAL, [-28.6950, -49.3680], LOCS.STA_LUZIA],
                path: [], 
                currentStep: 0, direction: 1, 
                speed: 0.004
            },
            { 
                id: 3, name: "201", routeName: "CENTRO / ESUCRI", color: "#10b981",
                waypoints: [LOCS.CENTRAL, LOCS.ESUCRI],
                path: [],
                currentStep: 0, direction: 1, 
                speed: 0.003
            }
        ];

        let map, busMarkers = {}, userMarker = null, currentLine = null, routeLayer = null;

        async function initMap() {
            map = L.map('map', { zoomControl: false }).setView(LOCS.CENTRAL, 15);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: 'AterBus System | OSRM'
            }).addTo(map);

            setFixedUserLocation(LOCS.ESUCRI);
            await fetchRealRoutes();
            renderBuses();
            setupSearch();
            
            document.getElementById('loadingScreen').style.opacity = '0';
            setTimeout(() => document.getElementById('loadingScreen').style.display = 'none', 1000);

            setInterval(updateSimulation, 50); 
        }

        async function fetchRealRoutes() {
            for (let bus of BUS_DATA) {
                const coordString = bus.waypoints.map(wp => `${wp[1]},${wp[0]}`).join(';');
                const url = `https://router.project-osrm.org/route/v1/driving/${coordString}?overview=full&geometries=geojson`;
                
                try {
                    const response = await fetch(url);
                    const data = await response.json();
                    if (data.routes && data.routes[0]) {
                        bus.path = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
                    } else {
                        bus.path = bus.waypoints;
                    }
                } catch (error) {
                    console.error(`Erro:`, error);
                    bus.path = bus.waypoints;
                }
            }
        }

        function setFixedUserLocation(coords) {
            const userIcon = L.divIcon({
                className: 'user-marker',
                html: `<div class="relative">
                        <div class="absolute -top-12 -left-8 bg-slate-900 text-white px-3 py-1.5 rounded-lg shadow-xl text-[10px] font-black border border-slate-700 whitespace-nowrap z-50">Você (ESUCRI)</div>
                        <div class="w-12 h-12 bg-blue-600 rounded-full border-4 border-white shadow-2xl flex items-center justify-center transform hover:scale-110 transition-transform">
                            <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                       </div>`,
                iconSize: [48, 48], iconAnchor: [24, 24]
            });
            userMarker = L.marker(coords, { icon: userIcon, zIndexOffset: 1000 }).addTo(map);
        }

        function renderBuses() {
            BUS_DATA.forEach(bus => {
                const icon = L.divIcon({
                    className: 'bus-marker',
                    html: `<div style="background-color: ${bus.color};" class="w-12 h-12 rounded-2xl border-4 border-white flex items-center justify-center shadow-xl rotate-45 transform hover:scale-110 transition-transform">
                            <div class="-rotate-45 text-white font-black text-sm">${bus.name}</div>
                           </div>`,
                    iconSize: [48, 48], iconAnchor: [24, 24]
                });
                const marker = L.marker(bus.path[0], { icon }).addTo(map);
                marker.on('click', () => selectBus(bus));
                busMarkers[bus.id] = marker;
            });
        }

        function setupSearch() {
            const input = document.getElementById('busSearch');
            const results = document.getElementById('searchResults');
            input.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                if (!query) { results.classList.add('hidden'); return; }
                const filtered = BUS_DATA.filter(b => b.name.includes(query) || b.routeName.toLowerCase().includes(query));
                if (filtered.length > 0) {
                    results.innerHTML = filtered.map(bus => `
                        <div onclick="selectBusById(${bus.id})" class="p-5 flex items-center gap-5 hover:bg-blue-50 cursor-pointer border-b border-slate-50 transition-colors group">
                            <div style="background-color: ${bus.color}" class="w-12 h-12 rounded-2xl flex items-center justify-center text-white font-black">
                                ${bus.name}
                            </div>
                            <div class="flex-1">
                                <p class="font-black text-slate-800 text-lg">Linha ${bus.name}</p>
                                <p class="text-[10px] text-slate-400 font-bold uppercase">${bus.routeName}</p>
                            </div>
                        </div>
                    `).join('');
                    results.classList.remove('hidden');
                } else {
                    results.innerHTML = `<div class="p-8 text-center text-slate-300 font-bold italic">Nenhum rastro encontrado...</div>`;
                    results.classList.remove('hidden');
                }
            });
        }

        function selectBusById(id) {
            selectBus(BUS_DATA.find(b => b.id === id));
        }

        function selectBus(bus) {
            currentLine = bus;
            document.getElementById('searchResults').classList.add('hidden');
            document.getElementById('busSearch').value = `Linha ${bus.name}`;
            document.getElementById('cardBusName').innerText = `L ${bus.name}`;
            document.getElementById('cardBusRoute').innerText = bus.routeName;
            const card = document.getElementById('infoCard');
            card.classList.remove('translate-y-full', 'md:opacity-0', 'md:pointer-events-none');
            card.classList.add('md:opacity-100', 'md:pointer-events-auto');
            map.flyTo(busMarkers[bus.id].getLatLng(), 17);
            drawTrajectory(bus);
        }

        function drawTrajectory(bus) {
            if (routeLayer) map.removeLayer(routeLayer);
            routeLayer = L.polyline(bus.path, {
                color: bus.color, weight: 8, opacity: 0.6, lineCap: 'round', lineJoin: 'round'
            }).addTo(map);
        }

        function updateSimulation() {
            BUS_DATA.forEach(bus => {
                if (bus.path.length < 2) return;
                if (bus.direction === 1) {
                    bus.currentStep += bus.speed;
                    if (bus.currentStep >= bus.path.length - 1) bus.direction = -1;
                } else {
                    bus.currentStep -= bus.speed;
                    if (bus.currentStep <= 0) bus.direction = 1;
                }
                const segment = Math.floor(bus.currentStep);
                const next = bus.direction === 1 ? segment + 1 : segment - 1;
                if (bus.path[next]) {
                    const p1 = bus.path[segment];
                    const p2 = bus.path[next];
                    const t = bus.currentStep - segment;
                    const lat = p1[0] + (p2[0] - p1[0]) * (bus.direction === 1 ? t : 1-t);
                    const lng = p1[1] + (p2[1] - p1[1]) * (bus.direction === 1 ? t : 1-t);
                    const pos = [lat, lng];
                    busMarkers[bus.id].setLatLng(pos);
                    if (currentLine && currentLine.id === bus.id) {
                        map.panTo(pos, { animate: false }); 
                        if (userMarker) {
                            const userPos = userMarker.getLatLng();
                            const dist = map.distance(pos, userPos) / 1000;
                            document.getElementById('cardDist').innerText = `${dist.toFixed(2)} km`;
                            // Previsão realista: 15km/h = 1km a cada 4 min
                            document.getElementById('cardETA').innerText = `${Math.ceil(dist * 4)}`; 
                        }
                    }
                }
            });
        }

        function closeDetails() {
            const card = document.getElementById('infoCard');
            card.classList.add('translate-y-full', 'md:opacity-0', 'md:pointer-events-none');
            if (routeLayer) map.removeLayer(routeLayer);
            currentLine = null;
            document.getElementById('busSearch').value = "";
        }

        function centerOnUser() {
            if (userMarker) map.flyTo(userMarker.getLatLng(), 17);
        }

        window.onload = initMap;
    </script>
</body>
</html>
